services:
  # Backend: Django Web Service
  - type: web
    name: village-water-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py migrate && python backend/manage.py collectstatic --noinput && python backend/manage.py shell -c \"from api.models import User; User.objects.filter(username='admin').exists() or User.objects.create_superuser(username='admin', email='admin@example.com', password='admin123', full_name='System Admin')\""
    startCommand: "cd backend && gunicorn VillageWaterSystem.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false # User will provide this from Aiven
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
